<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkriptForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
<script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
<script src="https://unpkg.com/blockly/msg/en.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* MC palette */
  --dirt:    #8B6914;
  --dirt2:   #6B4F10;
  --grass:   #5A8C2C;
  --grass2:  #4a7522;
  --stone:   #7a7a7a;
  --stone2:  #5a5a5a;
  --wood:    #9c7a3c;
  --coal:    #2a2a2a;
  --sky:     #1a2a3a;
  --sky2:    #0e1820;
  --gold:    #e8b830;
  --gold2:   #c89820;
  --diamond: #4de8e8;
  --red:     #cc3333;
  --green:   #44aa22;
  --green2:  #55cc33;
  --purple:  #884dcc;
  --teal:    #2abcbc;
  --orange:  #e07722;
  --text:    #f0f0e0;
  --text2:   #b8b8a0;
  --text3:   #666655;
  --border-w: 3px;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--sky2);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  image-rendering: pixelated;
}

/* ── PIXEL BORDER MIXIN ── */
.px-box {
  border: var(--border-w) solid #000;
  box-shadow:
    inset var(--border-w) var(--border-w) 0 rgba(255,255,255,0.25),
    inset calc(-1 * var(--border-w)) calc(-1 * var(--border-w)) 0 rgba(0,0,0,0.4);
}

.px-box-inset {
  border: var(--border-w) solid #000;
  box-shadow:
    inset var(--border-w) var(--border-w) 0 rgba(0,0,0,0.4),
    inset calc(-1 * var(--border-w)) calc(-1 * var(--border-w)) 0 rgba(255,255,255,0.1);
}

/* ── DIRT TEXTURE (CSS pattern) ── */
.dirt-bg {
  background-color: var(--dirt);
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 7px, rgba(0,0,0,0.08) 7px, rgba(0,0,0,0.08) 8px),
    repeating-linear-gradient(90deg, transparent, transparent 7px, rgba(0,0,0,0.06) 7px, rgba(0,0,0,0.06) 8px),
    radial-gradient(circle at 15% 20%, rgba(0,0,0,0.12) 2px, transparent 2px),
    radial-gradient(circle at 55% 70%, rgba(0,0,0,0.10) 2px, transparent 2px),
    radial-gradient(circle at 80% 35%, rgba(0,0,0,0.08) 2px, transparent 2px),
    radial-gradient(circle at 30% 80%, rgba(255,255,255,0.04) 2px, transparent 2px);
}

.stone-bg {
  background-color: var(--stone2);
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 15px, rgba(0,0,0,0.06) 15px, rgba(0,0,0,0.06) 16px),
    repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(0,0,0,0.04) 15px, rgba(0,0,0,0.04) 16px);
}

.coal-bg {
  background-color: #1e1e1e;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.02) 3px, rgba(255,255,255,0.02) 4px);
}

/* ── LAYOUT ── */
body { display: flex; flex-direction: column; }

/* ── TOPBAR ── */
.topbar {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 10px;
  flex-shrink: 0;
  border-bottom: var(--border-w) solid #000;
  position: relative;
  z-index: 10;
  background-color: var(--grass2);
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(0,0,0,0.1) 15px, rgba(0,0,0,0.1) 16px),
    linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
  box-shadow: 0 var(--border-w) 0 #000, inset 0 var(--border-w) 0 rgba(255,255,255,0.2);
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
  white-space: nowrap;
}

.logo-icon {
  width: 36px; height: 36px;
  background-color: var(--grass);
  border: 3px solid #000;
  box-shadow: inset 2px 2px 0 rgba(255,255,255,0.3), inset -2px -2px 0 rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  image-rendering: pixelated;
  flex-shrink: 0;
}

.logo-text { font-size: 11px; color: #fff; letter-spacing: 1px; }
.logo-sub  { font-size: 6px; color: var(--gold); display: block; margin-top: 3px; letter-spacing: 2px; }

.topbar-sep { width: 3px; height: 32px; background: #000; margin: 0 2px; flex-shrink: 0; }

.mc-badge {
  font-size: 6px;
  padding: 4px 8px;
  border: 2px solid #000;
  box-shadow: inset 1px 1px 0 rgba(255,255,255,0.2), inset -1px -1px 0 rgba(0,0,0,0.3);
  text-shadow: 1px 1px 0 #000;
  white-space: nowrap;
}
.badge-g { background: var(--grass); color: #fff; }
.badge-d { background: #1a3a3a; color: var(--diamond); }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* ── MC BUTTONS ── */
.mc-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 7px 12px;
  border: 3px solid #000;
  cursor: pointer;
  text-shadow: 2px 2px 0 #000;
  letter-spacing: 0.5px;
  transition: filter .1s;
  box-shadow: inset 2px 2px 0 rgba(255,255,255,0.2), inset -2px -2px 0 rgba(0,0,0,0.35), 2px 2px 0 rgba(0,0,0,0.5);
  position: relative;
  top: 0;
}
.mc-btn:active {
  box-shadow: inset 2px 2px 0 rgba(0,0,0,0.35), inset -2px -2px 0 rgba(255,255,255,0.1), 1px 1px 0 rgba(0,0,0,0.5);
  top: 1px;
}

.btn-stone  { background: var(--stone); color: #fff; }
.btn-stone:hover  { filter: brightness(1.15); }
.btn-green  { background: var(--grass); color: #fff; }
.btn-green:hover  { filter: brightness(1.15); }
.btn-gold   { background: var(--gold2); color: #fff; }
.btn-gold:hover   { filter: brightness(1.15); }
.btn-red    { background: var(--red); color: #fff; }
.btn-red:hover    { filter: brightness(1.15); }
.btn-diamond { background: #1a4a4a; color: var(--diamond); }
.btn-diamond:hover { filter: brightness(1.2); }
.btn-err    { background: #8a1a1a !important; color: #ffaaaa !important; }

/* ── MAIN LAYOUT ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 52px - 28px);
}

/* ── LEFT: PASTE AREA ── */
.paste-panel {
  width: 280px;
  min-width: 200px;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  border-right: var(--border-w) solid #000;
  overflow: hidden;
}

.panel-header {
  padding: 8px 12px;
  border-bottom: 3px solid #000;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  font-size: 7px;
  text-shadow: 1px 1px 0 #000;
  letter-spacing: 0.5px;
}
.panel-header .dot {
  width: 10px; height: 10px;
  border: 2px solid #000;
  flex-shrink: 0;
  box-shadow: inset 1px 1px 0 rgba(255,255,255,0.3);
}

.paste-area-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 10px;
  gap: 8px;
  overflow: hidden;
}

#pasteInput {
  flex: 1;
  resize: none;
  font-family: 'VT323', monospace;
  font-size: 16px;
  line-height: 1.5;
  padding: 10px;
  outline: none;
  color: #b0ffb0;
  border: 3px solid #000;
  box-shadow: inset 2px 2px 0 rgba(0,0,0,0.5), inset -1px -1px 0 rgba(255,255,255,0.05);
  caret-color: var(--green2);
  tab-size: 4;
  overflow: auto;
}
#pasteInput::placeholder { color: #336633; font-family: 'VT323', monospace; font-size: 15px; }
#pasteInput:focus { box-shadow: inset 2px 2px 0 rgba(0,0,0,0.5), 0 0 0 2px var(--green); }

.paste-btn-row { display: flex; gap: 8px; flex-shrink: 0; }
.paste-btn-row .mc-btn { flex: 1; text-align: center; font-size: 6px; }

#parseStatus {
  font-family: 'VT323', monospace;
  font-size: 15px;
  min-height: 20px;
  text-shadow: 1px 1px 0 #000;
  flex-shrink: 0;
}
.status-ok  { color: var(--green2); }
.status-err { color: #ff6666; }
.status-warn{ color: var(--gold); }

/* ── DIVIDER ── */
.divider {
  width: 6px;
  background: #000;
  cursor: col-resize;
  flex-shrink: 0;
  position: relative;
}
.divider::after {
  content: '⋮';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  color: var(--stone);
  font-size: 18px;
  letter-spacing: -2px;
  pointer-events: none;
}
.divider:hover { background: var(--grass); }
.divider.dragging { background: var(--grass); }

/* ── BLOCKLY PANEL ── */
.editor-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 200px;
}

#blocklyDiv { flex: 1; overflow: hidden; }

/* ── DIVIDER 2 ── */
.divider2 {
  width: 6px;
  background: #000;
  cursor: col-resize;
  flex-shrink: 0;
}
.divider2:hover, .divider2.dragging { background: var(--grass); }

/* ── CODE PANEL ── */
.code-panel {
  width: 38%;
  min-width: 220px;
  max-width: 65%;
  display: flex;
  flex-direction: column;
  border-left: var(--border-w) solid #000;
  overflow: hidden;
}

.code-header {
  height: 36px;
  border-bottom: 3px solid #000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  flex-shrink: 0;
}
.code-title {
  font-size: 7px;
  text-shadow: 1px 1px 0 #000;
  display: flex; align-items: center; gap: 8px;
}
.live-dot {
  width: 8px; height: 8px;
  background: var(--green2);
  border: 2px solid #000;
  animation: blink 1.2s steps(1) infinite;
}
@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

.code-btns { display: flex; gap: 6px; }

#codeArea {
  flex: 1;
  overflow: auto;
  padding: 12px 0;
  font-family: 'VT323', monospace;
  font-size: 16px;
  line-height: 1.6;
}

.sk-code { display: block; white-space: pre; }
.sk-code span { display: block; padding: 0 12px; }

.ln {
  display: inline-block !important;
  width: 2.6em;
  padding: 0 !important;
  text-align: right;
  margin-right: 14px;
  color: var(--stone);
  user-select: none;
  font-size: 14px;
}

/* code colors — MC flavored */
.sk-comment { color: #445544; }
.sk-event   { color: var(--gold); }
.sk-cond    { color: var(--diamond); }
.sk-loop    { color: var(--teal); }
.sk-var     { color: var(--orange); }
.sk-msg     { color: #88ff88; }
.sk-eff     { color: var(--purple); }
.sk-act     { color: #aaffaa; }
.sk-plain   { color: var(--text2); }
.sk-blank   { color: transparent; }

.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 16px;
  text-align: center; padding: 24px; user-select: none;
}
.es-icon { font-size: 48px; opacity: .3; }
.empty-state p {
  font-family: 'VT323', monospace;
  font-size: 18px; color: var(--stone); line-height: 1.6;
}

/* ── DIAG PANEL ── */
#diagPanel {
  flex-shrink: 0;
  border-top: 3px solid #000;
  max-height: 180px;
  overflow-y: auto;
  font-family: 'VT323', monospace;
  font-size: 15px;
}
.diag-item {
  padding: 7px 12px;
  border-bottom: 2px solid #000;
  cursor: pointer;
}
.diag-item:hover { filter: brightness(1.2); }
.diag-error { background: #2a0808; }
.diag-warn  { background: #2a1e00; }
.diag-head  { font-weight: bold; margin-bottom: 2px; }
.diag-error .diag-head { color: #ff6666; }
.diag-warn  .diag-head { color: var(--gold); }
.diag-msg   { color: var(--text); }
.diag-fix   { color: #88ff88; font-size: 13px; margin-top: 2px; }

/* ── STATUSBAR ── */
.statusbar {
  height: 28px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 20px;
  flex-shrink: 0;
  border-top: 3px solid #000;
  font-size: 6px;
  text-shadow: 1px 1px 0 #000;
  background-color: var(--dirt2);
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(0,0,0,0.1) 8px, rgba(0,0,0,0.1) 9px);
}
.stat { display: flex; align-items: center; gap: 6px; color: var(--text2); }
.stat span { color: var(--gold); }
.stat-right { margin-left: auto; color: var(--stone); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 38px; right: 16px;
  background: var(--grass);
  color: #fff;
  padding: 8px 14px;
  border: 3px solid #000;
  font-size: 8px;
  text-shadow: 1px 1px 0 #000;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
  opacity: 0; transform: translateY(8px);
  transition: all .2s; pointer-events: none; z-index: 9999;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── Blockly theming ── */
.blocklyMainBackground      { stroke: none !important; }
.blocklyToolboxDiv          { background: #1e1a0e !important; border-right: 3px solid #000 !important; }
.blocklyFlyoutBackground    { fill: #251f10 !important; fill-opacity: 1 !important; }
.blocklyTreeLabel           { color: #d4c484 !important; font-family: 'Press Start 2P', monospace !important; font-size: 8px !important; }
.blocklyTreeRow             { border-radius: 0 !important; margin: 1px 3px !important; }
.blocklyTreeRow:hover:not(.blocklyTreeSelected) { background: #3a3010 !important; }
.blocklyTreeSelected        { background: #3a5a10 !important; }
.blocklyTreeSelected .blocklyTreeLabel { color: var(--green2) !important; }
.blocklyScrollbarHandle     { fill: #5a4a20 !important; }
.blocklyText                { font-family: 'Press Start 2P', monospace !important; font-size: 8px !important; }
.blocklyEditableText rect   { fill: #1a1a0a !important; }
.blocklyEditableText text   { fill: #d4c484 !important; }
.blocklyDropdownText        { fill: #d4c484 !important; }
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar dirt-bg">
  <div class="logo">
    <div class="logo-icon">🟩</div>
    <div>
      <div class="logo-text">SkriptForge</div>
      <span class="logo-sub">MC 26.1.2 · SKRIPT 2.9</span>
    </div>
  </div>
  <div class="topbar-sep"></div>
  <span class="mc-badge badge-g">✔ SKRIPT 2.9</span>
  <span class="mc-badge badge-d">◆ MC 26.1.2</span>
  <div class="topbar-right">
    <button class="mc-btn btn-stone" onclick="toggleWrap()" id="btnWrap">↵ WRAP</button>
    <button class="mc-btn btn-stone" onclick="downloadSk()">⬇ .SK</button>
    <button class="mc-btn btn-green" id="btnCopy" onclick="copyCode()">📋 COPY</button>
    <div class="topbar-sep"></div>
    <button class="mc-btn btn-red" onclick="clearWorkspace()">✕ CLEAR</button>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="main">

  <!-- LEFT: Paste area -->
  <div class="paste-panel coal-bg" id="pastePanel">
    <div class="panel-header dirt-bg">
      <div class="dot" style="background:var(--diamond)"></div>
      PASTE .SK CODE
    </div>
    <div class="paste-area-wrap">
      <textarea id="pasteInput" class="coal-bg px-box-inset"
        placeholder="Paste your .sk code here...&#10;&#10;on join:&#10;    send &quot;&aWelcome!&quot; to player&#10;&#10;Then click IMPORT ↓"
        spellcheck="false"></textarea>
      <div id="parseStatus"></div>
      <div class="paste-btn-row">
        <button class="mc-btn btn-gold" onclick="parseAndLoad()">▶ IMPORT</button>
        <button class="mc-btn btn-stone" onclick="clearPaste()">✕ CLEAR</button>
      </div>
    </div>
  </div>

  <div class="divider" id="dividerLeft"></div>

  <!-- MIDDLE: Blockly -->
  <div class="editor-panel">
    <div class="panel-header stone-bg">
      <div class="dot" style="background:var(--orange)"></div>
      BLOCK WORKSPACE — DRAG BLOCKS TO BUILD
    </div>
    <div id="blocklyDiv"></div>
  </div>

  <div class="divider2" id="dividerRight"></div>

  <!-- RIGHT: Code output -->
  <div class="code-panel coal-bg" id="codePanel">
    <div class="code-header stone-bg">
      <div class="code-title">
        <div class="live-dot"></div>
        LIVE OUTPUT
      </div>
      <div class="code-btns">
        <button class="mc-btn btn-stone" style="font-size:6px;padding:5px 8px;" onclick="toggleWrap()">↵</button>
      </div>
    </div>
    <div id="codeArea">
      <div class="empty-state">
        <div class="es-icon">⛏</div>
        <p>DRAG AN EVENT BLOCK<br>OR PASTE CODE ON THE LEFT</p>
      </div>
    </div>
    <!-- diagPanel injected here -->
  </div>

</div>

<!-- ── STATUSBAR ── -->
<div class="statusbar">
  <div class="stat">BLOCKS <span id="statBlocks">0</span></div>
  <div class="stat">LINES <span id="statLines">0</span></div>
  <div class="stat">EVENTS <span id="statEvents">0</span></div>
  <div class="stat">ERRORS <span id="statErrors" style="color:var(--green2)">0</span></div>
  <div class="stat">WARNS <span id="statWarns" style="color:var(--green2)">0</span></div>
  <div class="stat stat-right">SKRIPTFORGE V2 · MC 26.1.2</div>
</div>

<div class="toast" id="toast"></div>

<!-- ── TOOLBOX ── -->
<xml id="toolbox" style="display:none">
  <category name="⚡ EVENTS" colour="#c47a00">
    <label text="— Player —"></label>
    <block type="sk_on_join"></block>
    <block type="sk_on_quit"></block>
    <block type="sk_on_chat"></block>
    <block type="sk_on_command"></block>
    <block type="sk_on_death"></block>
    <block type="sk_on_respawn"></block>
    <block type="sk_on_damage"></block>
    <block type="sk_on_heal"></block>
    <block type="sk_on_sneak"></block>
    <block type="sk_on_sprint"></block>
    <block type="sk_on_move"></block>
    <label text="— World —"></label>
    <block type="sk_on_break"></block>
    <block type="sk_on_place"></block>
    <block type="sk_on_right_click"></block>
    <block type="sk_on_left_click"></block>
    <block type="sk_on_item_drop"></block>
    <block type="sk_on_item_pickup"></block>
    <block type="sk_on_consume"></block>
    <block type="sk_on_craft"></block>
    <block type="sk_on_inventory_click"></block>
    <block type="sk_on_entity_spawn"></block>
    <block type="sk_on_entity_death"></block>
    <block type="sk_on_projectile_hit"></block>
    <label text="— Server —"></label>
    <block type="sk_on_server_start"></block>
    <block type="sk_on_server_stop"></block>
    <block type="sk_every_x_seconds"></block>
  </category>
  <category name="🔀 CONDITIONS" colour="#1a6aab">
    <label text="— Player —"></label>
    <block type="sk_if_permission"></block>
    <block type="sk_if_gamemode"></block>
    <block type="sk_if_world"></block>
    <block type="sk_if_health_below"></block>
    <block type="sk_if_health_above"></block>
    <block type="sk_if_food_below"></block>
    <block type="sk_if_online"></block>
    <block type="sk_if_op"></block>
    <block type="sk_if_sneaking"></block>
    <block type="sk_if_flying"></block>
    <block type="sk_if_sprinting"></block>
    <block type="sk_if_on_ground"></block>
    <label text="— Items / Blocks —"></label>
    <block type="sk_if_holding"></block>
    <block type="sk_if_has_item"></block>
    <block type="sk_if_block_is"></block>
    <label text="— Variables —"></label>
    <block type="sk_if_var_equals"></block>
    <block type="sk_if_var_greater"></block>
    <block type="sk_if_var_less"></block>
    <block type="sk_if_var_set"></block>
    <label text="— Logic —"></label>
    <block type="sk_else"></block>
    <block type="sk_else_if_perm"></block>
  </category>
  <category name="💬 MESSAGES" colour="#1a7a6e">
    <block type="sk_send_message"></block>
    <block type="sk_send_title"></block>
    <block type="sk_send_subtitle"></block>
    <block type="sk_send_actionbar"></block>
    <block type="sk_broadcast"></block>
    <block type="sk_log_console"></block>
  </category>
  <category name="⚙ PLAYER" colour="#3a7a2a">
    <label text="— State —"></label>
    <block type="sk_set_gamemode"></block>
    <block type="sk_set_health"></block>
    <block type="sk_heal"></block>
    <block type="sk_set_food"></block>
    <block type="sk_add_xp"></block>
    <block type="sk_set_level"></block>
    <block type="sk_set_fly"></block>
    <label text="— Movement —"></label>
